<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8" />
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { background: #ffffff; overflow: hidden; }
    #root { display: inline-block; }
    #root svg { display: block; }
  </style>
</head>
<body>
  <div id="root"></div>

  <script type="module">
    const loadErrors = [];

    async function loadEsmRenderer() {
      const candidates = [
        {
          name: "jsdelivr ESM @excalidraw/excalidraw@0.18.1",
          url: "https://cdn.jsdelivr.net/npm/@excalidraw/excalidraw@0.18.1/+esm",
        },
      ];

      for (const candidate of candidates) {
        try {
          const module = await import(candidate.url);
          if (typeof module.exportToSvg === "function") {
            return { exportToSvg: module.exportToSvg, source: candidate.name };
          }
          loadErrors.push(`${candidate.name}: exportToSvg is not a function`);
        } catch (err) {
          loadErrors.push(`${candidate.name}: ${String(err && err.message || err)}`);
        }
      }

      return null;
    }

    function loadScript(src) {
      return new Promise((resolve, reject) => {
        const script = document.createElement("script");
        script.crossOrigin = "anonymous";
        script.src = src;
        script.onload = resolve;
        script.onerror = () => reject(new Error(`failed to load ${src}`));
        document.head.appendChild(script);
      });
    }

    async function loadUmdRenderer() {
      const source = "unpkg UMD @excalidraw/excalidraw@0.17.6";
      try {
        await loadScript("https://unpkg.com/react@18.2.0/umd/react.production.min.js");
        await loadScript("https://unpkg.com/react-dom@18.2.0/umd/react-dom.production.min.js");
        await loadScript("https://unpkg.com/@excalidraw/excalidraw@0.17.6/dist/excalidraw.production.min.js");

        if (window.ExcalidrawLib && typeof window.ExcalidrawLib.exportToSvg === "function") {
          return { exportToSvg: window.ExcalidrawLib.exportToSvg, source };
        }

        loadErrors.push(`${source}: window.ExcalidrawLib.exportToSvg is not available`);
      } catch (err) {
        loadErrors.push(`${source}: ${String(err && err.message || err)}`);
      }

      return null;
    }

    async function loadRenderer() {
      const esmRenderer = await loadEsmRenderer();
      if (esmRenderer) return esmRenderer;

      const umdRenderer = await loadUmdRenderer();
      if (umdRenderer) return umdRenderer;

      throw new Error(loadErrors.join("\n"));
    }

    window.renderDiagram = async function(jsonData, opts) {
      try {
        opts = opts || {};
        if (typeof window.__exportToSvg !== "function") {
          throw new Error("Renderer is not ready");
        }

        const data = typeof jsonData === "string" ? JSON.parse(jsonData) : jsonData;
        const elements = data.elements || [];
        const appState = data.appState || {};
        const files = data.files || {};

        const darkMode = opts.darkMode || false;
        const bgColor = appState.viewBackgroundColor || (darkMode ? "#1e1e2e" : "#ffffff");

        appState.viewBackgroundColor = bgColor;
        appState.exportWithDarkMode = false;
        document.body.style.background = bgColor;

        const svg = await window.__exportToSvg({
          elements: elements,
          appState: Object.assign({}, appState, { exportBackground: true }),
          files: files,
        });

        const root = document.getElementById("root");
        while (root.firstChild) root.removeChild(root.firstChild);
        root.appendChild(svg);

        window.__renderComplete = true;
        window.__renderError = null;
        return { success: true, width: svg.getAttribute("width"), height: svg.getAttribute("height") };
      } catch (err) {
        window.__renderComplete = true;
        window.__renderError = String(err && err.message || err);
        return { success: false, error: String(err && err.message || err) };
      }
    };

    loadRenderer()
      .then((renderer) => {
        window.__exportToSvg = renderer.exportToSvg;
        window.__rendererSource = renderer.source;
        window.__moduleReady = true;
      })
      .catch((err) => {
        window.__moduleError = String(err && err.message || err);
        console.error(window.__moduleError);
      });
  </script>
</body>
</html>
