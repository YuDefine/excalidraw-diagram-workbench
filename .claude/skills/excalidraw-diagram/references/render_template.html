<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8" />
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { background: #ffffff; overflow: hidden; }
    #root { display: inline-block; }
    #root svg { display: block; }
  </style>
  <!--
    Use UMD bundles from unpkg instead of esm.sh ESM build.
    esm.sh has been observed serving 404 for transitive deps
    (e.g. @braintree/sanitize-url@6.0.2/es2022/dist/constants.mjs),
    which causes the entire ESM module graph to never become ready
    and the Playwright wait_for_function call to time out.
    The UMD path bypasses esm.sh's runtime resolver entirely.
  -->
  <script crossorigin src="https://unpkg.com/react@18.2.0/umd/react.production.min.js"></script>
  <script crossorigin src="https://unpkg.com/react-dom@18.2.0/umd/react-dom.production.min.js"></script>
  <script src="https://unpkg.com/@excalidraw/excalidraw@0.17.6/dist/excalidraw.production.min.js"></script>
</head>
<body>
  <div id="root"></div>

  <script>
    window.renderDiagram = async function(jsonData, opts) {
      try {
        opts = opts || {};
        const data = typeof jsonData === "string" ? JSON.parse(jsonData) : jsonData;
        const elements = data.elements || [];
        const appState = data.appState || {};
        const files = data.files || {};

        const darkMode = opts.darkMode || false;
        const bgColor = appState.viewBackgroundColor || (darkMode ? "#1e1e2e" : "#ffffff");

        appState.viewBackgroundColor = bgColor;
        appState.exportWithDarkMode = false;
        document.body.style.background = bgColor;

        const svg = await window.ExcalidrawLib.exportToSvg({
          elements: elements,
          appState: Object.assign({}, appState, { exportBackground: true }),
          files: files,
        });

        const root = document.getElementById("root");
        while (root.firstChild) root.removeChild(root.firstChild);
        root.appendChild(svg);

        window.__renderComplete = true;
        window.__renderError = null;
        return { success: true, width: svg.getAttribute("width"), height: svg.getAttribute("height") };
      } catch (err) {
        window.__renderComplete = true;
        window.__renderError = String(err && err.message || err);
        return { success: false, error: String(err && err.message || err) };
      }
    };

    // Wait for UMD scripts to expose ExcalidrawLib on window.
    // Polling beats `defer`/`DOMContentLoaded` because we don't control script ordering on slow networks.
    (function waitReady() {
      if (window.ExcalidrawLib && typeof window.ExcalidrawLib.exportToSvg === "function") {
        window.__moduleReady = true;
      } else {
        setTimeout(waitReady, 100);
      }
    })();
  </script>
</body>
</html>
